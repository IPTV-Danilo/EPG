name: Actualizar EPG cada 2 horas

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

# Forzar Node.js 24 para eliminar warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Ejecutar scraper
      run: python run.py
      
    - name: Verificar que se generó el archivo
      run: |
        if [ -f "data/epg.xml" ]; then
          echo "✅ EPG generado correctamente"
          ls -lh data/epg.xml
        else
          echo "❌ No se generó el archivo epg.xml"
          exit 1
        fi
        
    - name: Commit y push de los archivos generados
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/epg.xml
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Actualización automática EPG $(date '+%Y-%m-%d %H:%M:%S')"
        git push
